@if (slides().length > 0) {
<section class="banner" id="promo-banner"
  [style.background]="slides()[activeIndex()].bgColor"
  [class.transitioning]="isTransitioning()">

  <!-- Decorative Elements -->
  <div class="banner-decor">
    <div class="decor-circle decor-circle-1"></div>
    <div class="decor-circle decor-circle-2"></div>
    <div class="decor-ring"></div>
    <div class="decor-dots"></div>
  </div>

  <!-- Content -->
  <div class="banner-content" [class.fade-out]="isTransitioning()">
    <span class="banner-subtitle">{{ slides()[activeIndex()].subtitle }}</span>
    <h2 class="banner-title">{{ slides()[activeIndex()].title }}</h2>
    <p class="banner-desc">{{ slides()[activeIndex()].description }}</p>
    <button class="banner-cta" (click)="onCtaClick()" id="banner-cta">
      <span>{{ slides()[activeIndex()].ctaText }}</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12" />
        <polyline points="12 5 19 12 12 19" />
      </svg>
    </button>
  </div>

  <!-- Carousel Dots -->
  <div class="banner-dots" id="banner-dots">
    @for (slide of slides(); track $index) {
    <button class="dot"
      [class.active]="$index === activeIndex()"
      (click)="goToSlide($index)"
      [attr.aria-label]="'Go to slide ' + ($index + 1)">
    </button>
    }
  </div>

</section>
}
