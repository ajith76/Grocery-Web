<!-- Grocery Shopping App - Dashboard -->
<app-header
  [brandName]="brandName()"
  [searchPlaceholder]="searchPlaceholder()"
  [cartCount]="cartCount()"
  [user]="currentUser()"
  [promo]="promoConfig()"
  (menuToggle)="onMenuToggle()"
  (searchSubmit)="onSearch($event)"
  (cartClick)="onCartClick()"
  (avatarClick)="onAvatarClick()">
</app-header>

<app-side-nav
  [categories]="categories()"
  [isOpen]="sideNavOpen()"
  [title]="'Categories'"
  [activeFilter]="activeFilterCategory()"
  (categorySelect)="onCategorySelect($event)"
  (closeNav)="onSideNavClose()">
</app-side-nav>

<div class="dashboard-body">
  <div class="dashboard-content" id="dashboard-content">
    <!-- Promo Banner Carousel -->
    <app-banner [slides]="bannerSlides()" [intervalMs]="4000"></app-banner>

    <!-- Active Filter Chip -->
    @if (activeFilterCategory()) {
    <div class="filter-chip-bar">
      <span class="filter-label">Filtered by:</span>
      <div class="filter-chip">
        <span>{{ activeFilterCategory() }}</span>
        <button class="chip-clear" (click)="clearFilter()" aria-label="Clear filter">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <button class="clear-all-btn" (click)="clearFilter()">Clear All</button>
    </div>
    }

    <!-- Featured Products -->
    <app-product-screen [filterCategory]="activeFilterCategory()"></app-product-screen>
  </div>
</div>

<app-footer></app-footer>
