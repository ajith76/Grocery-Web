<!-- Grocery Shopping App - Dashboard -->
<app-header
  [brandName]="brandName()"
  [searchPlaceholder]="searchPlaceholder()"
  [cartCount]="cartCount()"
  [wishlistCount]="wishlistIds().length"
  [user]="currentUser()"
  [promo]="promoConfig()"
  (menuToggle)="onMenuToggle()"
  (searchSubmit)="onSearch($event)"
  (cartClick)="onCartClick()"
  (wishlistClick)="onHeaderWishlistClick()"
  (avatarClick)="onAvatarClick()">
</app-header>

<app-side-nav
  [categories]="categories()"
  [isOpen]="sideNavOpen()"
  [title]="'Categories'"
  [activeFilters]="activeFilterCategories()"
  (categorySelect)="onCategorySelect($event)"
  (closeNav)="onSideNavClose()">
</app-side-nav>

<div class="dashboard-body">
  <div class="dashboard-content" id="dashboard-content">

    @if (showingCart()) {
      <!-- Cart View -->
      <div class="filter-chip-bar" style="margin-bottom: 20px;">
        <span class="filter-label">Shopping Cart</span>
        <button class="clear-all-btn" (click)="showingCart.set(false)">Continue Shopping</button>
      </div>
      <app-cart-screen
        [cartItems]="cartItemsData()"
        (cartChange)="onCartChange($event)">
      </app-cart-screen>

    } @else if (showingWishlist()) {
      <!-- Wishlist View -->
      <div class="filter-chip-bar">
        <span class="filter-label">Viewing Wishlist</span>
        <button class="clear-all-btn" (click)="showingWishlist.set(false)">Back to Products</button>
      </div>
      <app-product-screen
        [filterCategories]="activeFilterCategories()"
        [wishlistIds]="wishlistIds()"
        [isWishlistMode]="true"
        [searchQuery]="searchQuery()"
        [cartItems]="cartItemsMap()"
        (wishlistToggle)="onWishlistToggle($event)"
        (cartChange)="onCartChange($event)">
      </app-product-screen>

    } @else {
      <!-- Default Products View -->
      <app-banner [slides]="bannerSlides()" [intervalMs]="4000"></app-banner>

      @if (activeFilterCategories().length > 0) {
      <div class="filter-chip-bar">
        <span class="filter-label">Filtered by:</span>
        <div class="chip-container">
          @for (category of activeFilterCategories(); track category) {
          <div class="filter-chip">
            <span>{{ category }}</span>
            <button class="chip-clear" (click)="removeCategoryFilter(category)" aria-label="Remove filter">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
          </div>
          }
        </div>
        <button class="clear-all-btn" (click)="clearFilter()">Clear All</button>
      </div>
      }

      <app-product-screen
        [filterCategories]="activeFilterCategories()"
        [wishlistIds]="wishlistIds()"
        [isWishlistMode]="false"
        [searchQuery]="searchQuery()"
        [cartItems]="cartItemsMap()"
        (wishlistToggle)="onWishlistToggle($event)"
        (cartChange)="onCartChange($event)">
      </app-product-screen>
    }

  </div>
</div>

<app-footer></app-footer>
